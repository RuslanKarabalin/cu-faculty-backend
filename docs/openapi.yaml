      description: Максимум 20 навыков. Полностью заменяет текущий список.
      tags: [Users]
      operationId: updateMySoftSkills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skillIds]
              properties:
                skillIds:
                  type: array
                  items:
                    type: integer
                  maxItems: 20
      responses:
        '200':
          description: Актуальный список навыков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
        '400':
          description: Превышен лимит навыков или невалидные ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

