        id:
          type: integer
        question:
          type: string
          maxLength: 255
        answer:
          type: string
          maxLength: 255

    FAQCreate:
      type: object
      required: [question, answer]
      properties:
        question:
          type: string
          maxLength: 255
        answer:
          type: string
          maxLength: 255

    # Announcement schemas
    Announcement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time
        isArchived:
          type: boolean

    AnnouncementCreate:
      type: object
      required: [creatorId, title, content]
      properties:
        creatorId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        isArchived:
          type: boolean
          default: false

    # News schemas
    NewsArticle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        photoOnS3Id:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time

    NewsCreate:
      type: object
      required: [userId, photoOnS3Id, title, content]
      properties:
        userId:
          type: string
          format: uuid
        photoOnS3Id:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255

    # Event schemas
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        photoOnS3Id:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        place:
          type: string
          maxLength: 63
        time:
          type: string
          format: date-time
        registrationLink:
          type: string
          maxLength: 255
          nullable: true
        createdAt:
          type: string
          format: date-time

    EventCreate:
      type: object
      required: [userId, photoOnS3Id, title, content, place, time]
      properties:
        userId:
          type: string
          format: uuid
        photoOnS3Id:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        place:
          type: string
          maxLength: 63
        time:
          type: string
          format: date-time
        registrationLink:
          type: string
          maxLength: 255
          nullable: true
