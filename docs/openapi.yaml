openapi: 3.0.3
info:
  title: CU Faculty API
  version: 1.0.0
  description: REST API для платформы факультетского сообщества Центрального Университета

servers:
  - url: /

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: bff.cookie

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: unauthorized

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, unhealthy]

    UserRole:
      type: string
      enum: [user, admin]

    SocialNetwork:
      type: string
      enum: [vk, telegram, github]

    EduGrade:
      type: string
      enum: [bachelor, master, specialist, postgraduate]

    WorkGrade:
      type: string
      enum: [intern, junior, junior_plus, middle, middle_plus, senior, staff, principal, lead, head]

    # --- Auth ---

    CuUserResp:
      type: object
      description: Данные пользователя из CU API, возвращаются при регистрации
      required: [id, firstName, lastName, birthdate]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        birthdate:
          type: string
          format: date
          example: "2000-05-15"

    # --- Users ---

    User:
      type: object
      required: [id, firstName, lastName, birthdate, role]
      properties:
        id:
          type: string
          format: uuid
        photoS3Key:
          type: string
          nullable: true
        firstName:
          type: string
          maxLength: 31
        lastName:
          type: string
          maxLength: 31
        bio:
          type: string
          maxLength: 255
          nullable: true
        birthdate:
          type: string
          format: date-time
        speciality:
          type: string
          maxLength: 63
          nullable: true
        status:
          type: string
          nullable: true
          example: "Собираю команду"
        role:
          $ref: '#/components/schemas/UserRole'

    UserPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    UpdateProfileRequest:
      type: object
      properties:
        photoS3Key:
          type: string
          nullable: true
        bio:
          type: string
          maxLength: 255
          nullable: true
        speciality:
          type: string
          maxLength: 63
          nullable: true
        statusId:
          type: integer
          nullable: true
          description: ID из справочника статусов; null - снять статус

    # --- Socials ---

    Social:
      type: object
      required: [id, social, link, isPreferred]
      properties:
        id:
          type: integer
        social:
          $ref: '#/components/schemas/SocialNetwork'
        link:
          type: string
          maxLength: 127
          description: Юзернейм или полная ссылка в соцсети
        isPreferred:
          type: boolean

    UpsertSocialsRequest:
      type: object
      required: [socials]
      properties:
        socials:
          type: array
          items:
            type: object
            required: [social, link, isPreferred]
            properties:
              social:
                $ref: '#/components/schemas/SocialNetwork'
              link:
                type: string
                maxLength: 127
              isPreferred:
                type: boolean

    # --- Work places ---

    WorkPlace:
      type: object
      required: [id, companyName, grade, position, startYear, isWorkingNow]
      properties:
        id:
          type: integer
        companyName:
          type: string
          maxLength: 63
          example: "Яндекс"
        grade:
          $ref: '#/components/schemas/WorkGrade'
        position:
          type: string
          maxLength: 63
          example: "Backend Developer"
        startYear:
          type: integer
          example: 2022
        endYear:
          type: integer
          nullable: true
        isWorkingNow:
          type: boolean

    WorkPlaceRequest:
      type: object
      required: [companyName, grade, position, startYear, isWorkingNow]
      properties:
        companyName:
          type: string
          maxLength: 63
        grade:
          $ref: '#/components/schemas/WorkGrade'
        position:
          type: string
          maxLength: 63
        startYear:
          type: integer
        endYear:
          type: integer
          nullable: true
        isWorkingNow:
          type: boolean

    # --- Edu places ---

    EduPlace:
      type: object
      required: [id, institutionName, grade, specialization, startYear, isStudyingNow]
      properties:
        id:
          type: integer
        institutionName:
          type: string
          maxLength: 63
          example: "МГУ"
        grade:
          $ref: '#/components/schemas/EduGrade'
        level:
          type: string
          maxLength: 31
          nullable: true
          description: Курс (для студентов)
        specialization:
          type: string
          maxLength: 31
        startYear:
          type: integer
        endYear:
          type: integer
          nullable: true
        isStudyingNow:
          type: boolean

    EduPlaceRequest:
      type: object
      required: [institutionName, grade, specialization, startYear, isStudyingNow]
      properties:
        institutionName:
          type: string
          maxLength: 63
        grade:
          $ref: '#/components/schemas/EduGrade'
        level:
          type: string
          maxLength: 31
          nullable: true
        specialization:
          type: string
          maxLength: 31
        startYear:
          type: integer
        endYear:
          type: integer
          nullable: true
        isStudyingNow:
          type: boolean

    # --- Skills ---

    Skill:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 63

    # --- Status ---

    Status:
      type: object
      required: [id, content]
      properties:
        id:
          type: integer
        content:
          type: string
          maxLength: 127
          example: "Собираю команду"

    # --- Contacts / Saved ---

    Contact:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
        note:
          type: string
          maxLength: 255
          nullable: true

    ContactPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    SavedUserPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # --- Announcements ---

    Announcement:
      type: object
      required: [id, authorId, title, content, createdAt, isArchived]
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 40
          example: "Ищу iOS разработчика в стартап"
        content:
          type: string
          maxLength: 150
        createdAt:
          type: string
          format: date-time
        isArchived:
          type: boolean
        respondents:
          type: array
          items:
            $ref: '#/components/schemas/User'
          description: Только для автора объявления

    AnnouncementPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Announcement'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    AnnouncementRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          maxLength: 40
        content:
          type: string
          maxLength: 150

    # --- Events ---

    Event:
      type: object
      required: [id, authorId, photoS3Key, title, content, place, startsAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        photoS3Key:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
          example: "Встреча выпускников 2026"
        content:
          type: string
          maxLength: 255
        place:
          type: string
          maxLength: 63
          example: "Главный корпус, ауд. 101"
        startsAt:
          type: string
          format: date-time
        registrationLink:
          type: string
          maxLength: 255
          nullable: true
        createdAt:
          type: string
          format: date-time

    EventPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    EventRequest:
      type: object
      required: [photoS3Key, title, content, place, startsAt]
      properties:
        photoS3Key:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255
        place:
          type: string
          maxLength: 63
        startsAt:
          type: string
          format: date-time
        registrationLink:
          type: string
          maxLength: 255
          nullable: true

    # --- News ---

    News:
      type: object
      required: [id, authorId, photoS3Key, title, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        photoS3Key:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
          example: "Итоги хакатона 2026"
        content:
          type: string
          maxLength: 255
        createdAt:
          type: string
          format: date-time

    NewsPage:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/News'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    NewsRequest:
      type: object
      required: [photoS3Key, title, content]
      properties:
        photoS3Key:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 31
        content:
          type: string
          maxLength: 255

    # --- FAQs ---

    FAQ:
      type: object
      required: [id, question, answer]
      properties:
        id:
          type: integer
        question:
          type: string
          maxLength: 255
        answer:
          type: string
          maxLength: 255

    # --- Reference catalogs ---

    Company:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 63

    University:
      type: object
      required: [id, name, shortName]
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 127
        shortName:
          type: string
          maxLength: 31

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized

    Forbidden:
      description: Доступ запрещён (недостаточно прав)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: forbidden

    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not found

    BadGateway:
      description: Ошибка обращения к CU API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: upstream service unavailable

    InternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: internal server error

  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AnnouncementIdParam:
      name: announcementId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    EventIdParam:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    NewsIdParam:
      name: newsId
      in: path
      required: true
      schema:
        type: string
        format: uuid

paths:

  #  System 

  /health:
    get:
      summary: Проверка состояния сервиса
      security: []
      tags: [System]
      operationId: healthCheck
      responses:
        '200':
          description: Сервис работает нормально
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
        '503':
          description: Нет соединения с БД
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: unhealthy

  #  Auth 

  /register:
    get:
      summary: Регистрация через CU сессию
      description: |
        Проверяет cookie `bff.cookie` через CU API и создаёт пользователя.
        Если пользователь уже существует - возвращает его данные без ошибки.
        Единственный маршрут без middleware-аутентификации.
      security: []
      tags: [Auth]
      operationId: registerUser
      parameters:
        - name: bff.cookie
          in: cookie
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Пользователь зарегистрирован или уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuUserResp'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '500':
          $ref: '#/components/responses/InternalServerError'

  #  Users 

  /users:
    get:
      summary: Список пользователей
      description: Постраничный список пользователей с ролью `user`. Поддерживает поиск по имени/фамилии, специализации, компании и навыкам, а также фильтрацию.
      tags: [Users]
      operationId: getUsers
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: query
          in: query
          description: Полнотекстовый поиск по имени, фамилии, специализации, компании и навыкам
          schema:
            type: string
        - name: statusId
          in: query
          description: Фильтр по статусу
          schema:
            type: integer
        - name: speciality
          in: query
          description: Фильтр по специализации
          schema:
            type: string
        - name: companyName
          in: query
          description: Фильтр по месту работы (можно несколько)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: keySkillId
          in: query
          description: Фильтр по ключевым навыкам (можно несколько)
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: softSkillId
          in: query
          description: Фильтр по soft-навыкам (можно несколько)
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
      responses:
        '200':
          description: Постраничный список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me:
    get:
      summary: Профиль текущего пользователя
      tags: [Users]
      operationId: getMe
      responses:
        '200':
          description: Данные профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Обновление профиля текущего пользователя
      description: Обновляет фото, bio, специализацию и статус. Имя, фамилия и дата рождения синхронизируются из CU API и не редактируются здесь.
      tags: [Users]
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Обновлённые данные профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/socials:
    put:
      summary: Заменить соцсети текущего пользователя
      description: "Полностью заменяет список соцсетей. Ровно одна запись должна иметь `isPreferred: true`."
      tags: [Users]
      operationId: updateMySocials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSocialsRequest'
      responses:
        '200':
          description: Актуальный список соцсетей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Social'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/work-places:
    post:
      summary: Добавить место работы
      tags: [Users]
      operationId: addWorkPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkPlaceRequest'
      responses:
        '201':
          description: Созданная запись
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPlace'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/work-places/{workPlaceId}:
    parameters:
      - name: workPlaceId
        in: path
        required: true
        schema:
          type: integer
    put:
      summary: Обновить место работы
      tags: [Users]
      operationId: updateWorkPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkPlaceRequest'
      responses:
        '200':
          description: Обновлённая запись
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkPlace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Удалить место работы
      tags: [Users]
      operationId: deleteWorkPlace
      responses:
        '204':
          description: Удалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/edu-places:
    post:
      summary: Добавить место учёбы
      tags: [Users]
      operationId: addEduPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EduPlaceRequest'
      responses:
        '201':
          description: Созданная запись
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EduPlace'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/edu-places/{eduPlaceId}:
    parameters:
      - name: eduPlaceId
        in: path
        required: true
        schema:
          type: integer
    put:
      summary: Обновить место учёбы
      tags: [Users]
      operationId: updateEduPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EduPlaceRequest'
      responses:
        '200':
          description: Обновлённая запись
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EduPlace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Удалить место учёбы
      tags: [Users]
      operationId: deleteEduPlace
      responses:
        '204':
          description: Удалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/key-skills:
    put:
      summary: Заменить ключевые навыки текущего пользователя
      description: Максимум 20 навыков. Полностью заменяет текущий список.
      tags: [Users]
      operationId: updateMyKeySkills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skillIds]
              properties:
                skillIds:
                  type: array
                  items:
                    type: integer
                  maxItems: 20
      responses:
        '200':
          description: Актуальный список навыков
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
        '400':
          description: Превышен лимит навыков или невалидные ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/me/soft-skills:
    put:
