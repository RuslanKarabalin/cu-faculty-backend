name: cu-faculty
services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env
    ports:
      - 5432:5432
    networks:
      - main-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - main-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
    depends_on:
      - backend
    networks:
      - main-network

networks:
  main-network:
    driver: bridge
