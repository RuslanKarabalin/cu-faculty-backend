apiVersion: apps/v1
kind: Deployment
metadata:
  name: cu-faculty-backend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cu-faculty-backend
  template:
    metadata:
      labels:
        app: cu-faculty-backend
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: cu-faculty-backend
          image: registry.gitlab.com/cu-faculty/backend:latest
          envFrom:
            - secretRef:
                name: cu-faculty-backend-env
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cu-faculty-backend
  namespace: dev
spec:
  selector:
    app: cu-faculty-backend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cu-faculty-backend
  namespace: dev
  annotations:
    # Pin to the default :80 entrypoint so this host-less "/" rule doesn't also
    # attach to Garage's :8081 entrypoint (which would collide with it).
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cu-faculty-backend
                port:
                  number: 80
