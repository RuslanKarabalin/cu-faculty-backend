apiVersion: apps/v1
kind: Deployment
metadata:
  name: cu-faculty-backend
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cu-faculty-backend
  template:
    metadata:
      labels:
        app: cu-faculty-backend
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: cu-faculty-backend
          image: registry.gitlab.com/<your-project>/cu-faculty-backend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cu-faculty-backend
  namespace: prod
spec:
  selector:
    app: cu-faculty-backend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cu-faculty-backend
  namespace: prod
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cu-faculty-backend
                port:
                  number: 80
