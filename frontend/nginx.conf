server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the Go backend so the browser never makes a
    # cross-site request and the bff.cookie is sent automatically.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8080/health;
    }

    # Prerendered pages are emitted as <route>.html; everything else (e.g.
    # /students/[id]) falls back to the SPA shell and is routed client-side.
    location / {
        try_files $uri $uri.html $uri/ /200.html;
    }
}
